services:

  ##### migration runner (run once)
  migrate:
    build: .
    command: ["php", "CLI/Migrate.php"]
    volumes:
      - status-data:/var/lib/aux-status
    environment:
      CONFIG: /etc/aux-status/aux3-status.yaml
    configs:
      - source: aux-status-config
        target: /etc/aux-status/aux3-status.yaml
    restart: "no"

  ##### php
  php:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - status-data:/var/lib/aux-status
    environment:
      CONFIG: /etc/aux-status/aux3-status.yaml
    configs:
      - source: aux-status-config
        target: /etc/aux-status/aux3-status.yaml
    restart: unless-stopped

  ##### public stuff
  web:
    image: nginx:1.29-alpine
    depends_on:
      - php
    volumes:
      # Nginx only needs the public directory.
      - ./public:/var/www/html/public:ro

      # Custom virtual-host configuration.
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    restart: unless-stopped

  ##### poller
  poller:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - status-data:/var/lib/aux-status
    environment:
      CONFIG: /etc/aux-status/aux3-status.yaml
    configs:
      - source: aux-status-config
        target: /etc/aux-status/aux3-status.yaml
    command: ["php", "CronJobs/PollerLoop.php"]
    restart: unless-stopped

configs:
  aux-status-config:
    file: ./deploy/aux3-status.yaml

volumes:
  status-data:
