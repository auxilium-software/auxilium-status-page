server
{
    listen 80;
    listen [::]:80;

    server_name _;

    root /var/www/html/public;

    charset utf-8;
    server_tokens off;

    client_max_body_size 10m;

    location ~ ^/Static {}

    location /
    {
        try_files $uri @primary_router;
    }

    location @primary_router
    {
        include fastcgi_params;

        fastcgi_pass php:9000;

        fastcgi_param SCRIPT_FILENAME /var/www/html/Routing/PrimaryRouter.php;
        fastcgi_param SCRIPT_NAME /Routing/PrimaryRouter.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;

        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param HTTP_PROXY "";
    }

    location ~ \.php$
    {
        return 404;
    }
}
